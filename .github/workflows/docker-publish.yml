name: Publish container image

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Cache Amper
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/JetBrains/Amper
            ~/.amper
            ~/.gradle/caches
          key: ${{ runner.os }}-amper-${{ hashFiles('amper', 'module.yaml', 'libs.versions.toml', 'plugins/**/module.yaml') }}
          restore-keys: |
            ${{ runner.os }}-amper-

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image with Jib
        env:
          AMPER_JAVA_HOME: ${{ env.JAVA_HOME }}
        run: ./amper task :parley-room:jib@jib-plugin
