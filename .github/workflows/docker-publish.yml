name: Publish container image

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/gvart/parleyroom

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: parley-room
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: parley-room
          submodules: recursive

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Cache Amper
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/JetBrains/Amper
            ~/.amper
            ~/.gradle/caches
          key: ${{ runner.os }}-amper-${{ hashFiles('parley-room/amper', 'parley-room/module.yaml', 'parley-room/libs.versions.toml', 'parley-room/plugins/**/module.yaml') }}
          restore-keys: |
            ${{ runner.os }}-amper-

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image to local Docker daemon
        env:
          AMPER_JAVA_HOME: ${{ env.JAVA_HOME }}
        run: ./amper task :parley-room:jibDockerBuild@jib-plugin

      - name: Add OCI labels for repo linking
        run: |
          cat > Dockerfile.labels <<'EOF'
          ARG BASE
          FROM ${BASE}
          LABEL org.opencontainers.image.source="https://github.com/${{ github.repository }}"
          LABEL org.opencontainers.image.revision="${{ github.sha }}"
          LABEL org.opencontainers.image.licenses="Apache-2.0"
          EOF
          docker build --build-arg BASE="$IMAGE:latest" -f Dockerfile.labels -t "$IMAGE:latest" .

      - name: Read release version
        id: version
        run: echo "value=$(jq -r '."."' .release-please-manifest.json)" >> "$GITHUB_OUTPUT"

      - name: Tag and push image
        run: |
          SHA_TAG="sha-$(git rev-parse --short HEAD)"
          docker tag "$IMAGE:latest" "$IMAGE:${{ steps.version.outputs.value }}"
          docker tag "$IMAGE:latest" "$IMAGE:$SHA_TAG"
          docker push "$IMAGE" --all-tags
