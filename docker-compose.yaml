services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      - postgres
      - livekit
      - minio
    environment:
      DB_URL: "jdbc:postgresql://postgres:5432/parleyroom"
      DB_USER: "parleyroom"
      DB_PASSWORD: "parleyroom"
      LIVEKIT_URL: "ws://${APP_HOST}:7880"
      LIVEKIT_API_KEY: "devkey"
      LIVEKIT_API_SECRET: "devsecretdevsecretdevsecretdevsecret"
      STORAGE_ENDPOINT: "http://minio:9000"
      STORAGE_ACCESS_KEY: "minioadmin"
      STORAGE_SECRET_KEY: "minioadmin"
    ports:
      - "8080:8080"

  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: parleyroom
      POSTGRES_USER: parleyroom
      POSTGRES_PASSWORD: parleyroom
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  livekit:
    image: livekit/livekit-server:latest
    environment:
      LIVEKIT_CONFIG: |
        port: 7880
        bind_addresses: ["0.0.0.0"]
        rtc:
          tcp_port: 7881
          port_range_start: 50000
          port_range_end: 50019
          use_external_ip: false
          node_ip: "${HOST_IP}"
        keys:
          devkey: devsecretdevsecretdevsecretdevsecret
        logging:
          level: info
    ports:
      - "7880:7880"
      - "7881:7881"
      - "50000-50019:50000-50019/udp"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

volumes:
  postgres_data:
  minio_data: