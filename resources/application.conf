ktor {
  deployment {
    port = 8080
    port = ${?PORT}
  }
  application {
    modules = [ com.gvart.parleyroom.ApplicationKt.module ]
  }
}

database {
  url = "jdbc:postgresql://localhost:5432/parleyroom"
  url = ${?DB_URL}
  user = "parleyroom"
  user = ${?DB_USER}
  password = "parleyroom"
  password = ${?DB_PASSWORD}
}

jwt {
  secret = "secret"
  secret = ${?JWT_SECRET}
  issuer = "parley-room"
  audience = "parley-room-api"
  realm = "ParleyRoomRealm"
  duration = "60m"
  duration = ${?JWT_DURATION}
  refresh_duration = "30d"
  refresh_duration = ${?JWT_REFRESH_DURATION}
}

authentication {
  lockout {
    max_failed_attempts = 5
    max_failed_attempts = ${?AUTH_MAX_FAILED_ATTEMPTS}
    duration = "15m"
    duration = ${?AUTH_LOCKOUT_DURATION}
  }
}

livekit {
  url = "ws://localhost:7880"
  url = ${?LIVEKIT_URL}
  api_key = "devkey"
  api_key = ${?LIVEKIT_API_KEY}
  api_secret = "devsecretdevsecretdevsecretdevsecret"
  api_secret = ${?LIVEKIT_API_SECRET}
  token_ttl = "2h"
  token_ttl = ${?LIVEKIT_TOKEN_TTL}
}


application {
  admin {
    email = "admin@admin.co"
    email = ${?APPLICATION_ADMIN_EMAIL}
    default_password = "admin"
    default_password = ${?APPLICATION_ADMIN_DEFAULT_PASSWORD}
  }
  openapi {
    enabled = true
    enabled = ${?APPLICATION_OPENAPI_ENABLED}
  }
}

cors {
  # Comma-separated <scheme>://<host>[:<port>] entries. Supplied via CORS_ALLOWED_ORIGINS.
  # Empty default: no origins are allowed unless explicitly configured per environment.
  allowed_origins = ""
  allowed_origins = ${?CORS_ALLOWED_ORIGINS}
}

swagger {
  # Comma-separated Host header values allowed to reach /swagger and /docs.json.
  # Empty default (all origins blocked) so the public tunnel can't expose internal docs.
  # Set SWAGGER_ALLOWED_HOSTS in the deployment env (LAN hostnames only).
  allowed_hosts = ""
  allowed_hosts = ${?SWAGGER_ALLOWED_HOSTS}
}

vocabulary {
  review_reminder {
    enabled = true
    enabled = ${?VOCABULARY_REVIEW_REMINDER_ENABLED}
    interval = "1h"
    interval = ${?VOCABULARY_REVIEW_REMINDER_INTERVAL}
  }
}

storage {
  endpoint = "http://localhost:9000"
  endpoint = ${?STORAGE_ENDPOINT}
  region = "us-east-1"
  region = ${?STORAGE_REGION}
  access_key = "minioadmin"
  access_key = ${?STORAGE_ACCESS_KEY}
  secret_key = "minioadmin"
  secret_key = ${?STORAGE_SECRET_KEY}
  bucket = "parleyroom-materials"
  bucket = ${?STORAGE_BUCKET}
  max_file_size = 104857600
  max_file_size = ${?STORAGE_MAX_FILE_SIZE}
  path_style_access = true
  path_style_access = ${?STORAGE_PATH_STYLE}
}